<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True/False Game</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff4e8a, #ff9a9e);
    color: white;
}

.container {
    padding: 20px;
    max-width: 600px;
    margin: auto;
}

h1 {
    font-size: 28px;
}

.question {
    font-size: 22px;
    margin: 30px 0;
    min-height: 80px;
}

/* Buttons */
.btn {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.true { background: #28a745; color: white; }
.false { background: #dc3545; color: white; }

/* Feedback */
#feedback {
    font-size: 60px;
    height: 70px;
    font-weight: bold;
    transition: transform 0.3s ease;
}

.correct {
    color: #00ff99;
    transform: scale(1.3);
}

.wrong {
    color: #ff4d4d;
    transform: scale(1.3);
}

/* Highlight buttons */
.highlight-correct {
    background-color: #00c853 !important;
}

.highlight-wrong {
    background-color: #d50000 !important;
}

#restartBtn {
    display: none;
    margin-top: 30px;
    background: orange;
}

.score {
    font-size: 20px;
    margin-top: 20px;
}

/* Responsive */
@media (max-width: 600px) {
    .question { font-size: 18px; }
    .btn { font-size: 16px; padding: 10px 20px; }
}
</style>
</head>

<body>

<div class="container">
    <h1>True / False Game</h1>

    <div class="question" id="question">Loading...</div>
    <div id="feedback"></div>

    <button id="trueBtn" class="btn true" onclick="checkAnswer(true)">True</button>
    <button id="falseBtn" class="btn false" onclick="checkAnswer(false)">False</button>

    <div class="score" id="score"></div>
    <button id="restartBtn" onclick="restartGame()">Restart Game</button>
</div>

<!-- Sounds -->
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>
// Questions from your chapter
const questions = [
    {q: "A computer system consists only of hardware.", a: false},
    {q: "Operating system coordinates hardware and software.", a: true},
    {q: "Application software can run without system software.", a: false},
    {q: "Operating system provides a user interface.", a: true},
    {q: "GUI uses visual elements like icons and menus.", a: true},
    {q: "CLI requires typing commands.", a: true},
    {q: "Mobile OS is used only on desktops.", a: false},
    {q: "Disk Cleanup removes unwanted files.", a: true},
    {q: "Data compression increases file size.", a: false},
    {q: "Device drivers help hardware communicate with OS.", a: true}
];

let current = 0;
let score = 0;

function loadQuestion() {
    if (current < questions.length) {
        document.getElementById("question").innerText = questions[current].q;
    } else {
        endGame();
    }
}

function checkAnswer(userAnswer) {
    if (current >= questions.length) return;

    let feedback = document.getElementById("feedback");
    let trueBtn = document.getElementById("trueBtn");
    let falseBtn = document.getElementById("falseBtn");

    trueBtn.classList.remove("highlight-correct", "highlight-wrong");
    falseBtn.classList.remove("highlight-correct", "highlight-wrong");

    let correctAnswer = questions[current].a;

    if (correctAnswer === true) {
        trueBtn.classList.add("highlight-correct");
        if (userAnswer !== correctAnswer) falseBtn.classList.add("highlight-wrong");
    } else {
        falseBtn.classList.add("highlight-correct");
        if (userAnswer !== correctAnswer) trueBtn.classList.add("highlight-wrong");
    }

    if (userAnswer === correctAnswer) {
        score++;
        document.getElementById("correctSound").play();
        feedback.innerHTML = "✔";
        feedback.className = "correct";
        confettiEffect();

        if (navigator.vibrate) navigator.vibrate(100);
    } else {
        document.getElementById("wrongSound").play();
        feedback.innerHTML = "❌";
        feedback.className = "wrong";

        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

    current++;

    setTimeout(() => {
        feedback.innerHTML = "";
        trueBtn.classList.remove("highlight-correct", "highlight-wrong");
        falseBtn.classList.remove("highlight-correct", "highlight-wrong");
        loadQuestion();
    }, 800);
}

function endGame() {
    document.getElementById("question").innerText = "Game Over!";
    document.getElementById("score").innerText = "Your Score: " + score + "/" + questions.length;
    document.getElementById("restartBtn").style.display = "inline-block";
}

function restartGame() {
    current = 0;
    score = 0;
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("score").innerText = "";
    loadQuestion();
}

// Triangle Confetti
function confettiEffect() {
    for (let i = 0; i < 20; i++) {
        let confetti = document.createElement("div");
        confetti.style.position = "fixed";
        confetti.style.width = "0";
        confetti.style.height = "0";
        confetti.style.borderLeft = "6px solid transparent";
        confetti.style.borderRight = "6px solid transparent";
        confetti.style.borderBottom = "12px solid yellow";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.top = "-10px";

        document.body.appendChild(confetti);

        let fall = confetti.animate([
            { transform: "translateY(0px)" },
            { transform: "translateY(600px)" }
        ], {
            duration: 1000,
            easing: "ease-out"
        });

        fall.onfinish = () => confetti.remove();
    }
}

// Start game
loadQuestion();
</script>

</body>
</html>
